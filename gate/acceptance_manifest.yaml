# acceptance_manifest.yaml — PROTECTED (read-only to the worker). PROJECT-SPECIFIC.
#
# This shipped default is an EMPTY, PASSABLE template: with no checks and no review_items, a
# `candidate_complete` proposal is GRANTED. That is intentional — you OPT IN to strictness by
# adding checks. Until then the gate enforces only the state machine (the worker cannot
# self-declare `complete`), not any artifact criteria.
#
# Add machine checks that read REAL artifacts (never run_state). Each `surface` must match an id
# in surface_inventory.yaml. Built-in check types: config_not_disabled, min_series_points,
# identity_in_name, max_chart_count (extend run_machine_check() in gate/check_acceptance.py for
# your own). A worked, realistic spec is in examples/swanlab/.
#
# Example check (uncomment + adapt):
#   - id: val_curve_non_degenerate
#     surface: metrics_curves
#     type: min_series_points
#     artifact: "artifacts/eval/metrics.json"
#     series: "val/mae"
#     min_points: 2

objective: "define your project's acceptance checks here (see examples/swanlab/)"
checks: []
review_items: []
