# surface_inventory.yaml — PROTECTED (read-only to the worker). PROJECT-SPECIFIC.
#
# List the user-visible surfaces that, if touched, REQUIRE a passing check in
# acceptance_manifest.yaml (drives "unknowns fail closed"). This shipped default is EMPTY so a
# fresh install does not block — add your surfaces to opt in. A worked example: examples/swanlab/.
#
# `paths` (optional) are globs (fnmatch; `*` spans `/`) mapping changed files to a surface;
# gate/derive_touched.py uses them to compute a TRUSTED touched set from a git diff (so the
# uncovered-surface rule need not trust the worker's self-report). Keep them complete for every
# user-visible surface, or use check_acceptance.py --strict-surfaces.
#
# Example surface (uncomment + adapt):
#   - id: metrics_curves
#     user_visible: true
#     description: "training/eval curves a human reads"
#     paths: ["*metrics.json", "artifacts/*/eval/*"]

surfaces: []
